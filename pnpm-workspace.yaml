# Approved post-install build scripts. pnpm blocks build scripts by default; these are the
# trusted dependencies whose native/codegen build steps Decision Mirror relies on.
allowBuilds:
  "@parcel/watcher": false
  "@prisma/client": true
  "@prisma/engines": true
  "@swc/core": false
  esbuild: true
  msw: true
  prisma: true
  sharp: true
  unrs-resolver: true
