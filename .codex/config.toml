[mcp_servers.context7]
url = "https://mcp.context7.com/mcp"
  [mcp_servers.context7.env_http_headers]
  CONTEXT7_API_KEY = "CONTEXT7_API_KEY"

[mcp_servers.prisma]
command = "npx"
args = [ "-y", "prisma", "mcp" ]

[mcp_servers.prisma.tools.migrate-status]
approval_mode = "approve"

[mcp_servers.prisma.tools.migrate-reset]
approval_mode = "approve"

[mcp_servers.shadcn]
command = "npx"
args = [ "shadcn@latest", "mcp" ]

[mcp_servers.playwright]
command = "npx"
args = [ "-y", "@playwright/mcp@latest" ]

[mcp_servers.playwright.tools.browser_navigate]
approval_mode = "approve"

[mcp_servers.vercel]
url = "https://mcp.vercel.com"

[mcp_servers.sentry]
command = "npx"
args = [ "-y", "mcp-remote@latest", "https://mcp.sentry.dev/mcp" ]

[mcp_servers.posthog]
url = "https://mcp.posthog.com/mcp"

[mcp_servers.langsmith]
url = "https://eu.api.smith.langchain.com/mcp"
  [mcp_servers.langsmith.env_http_headers]
  "LANGSMITH-API-KEY" = "LANGSMITH_API_KEY"

[mcp_servers.next-devtools]
command = "npx"
args = [ "-y", "next-devtools-mcp@latest" ]

[mcp_servers.next-devtools.tools.init]
approval_mode = "approve"

[mcp_servers.next-devtools.tools.nextjs_index]
approval_mode = "approve"

[mcp_servers.next-devtools.tools.nextjs_docs]
approval_mode = "approve"

[mcp_servers.next-devtools.tools.nextjs_call]
approval_mode = "approve"

[mcp_servers.next-devtools.tools.browser_eval]
approval_mode = "approve"
